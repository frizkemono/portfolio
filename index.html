<!DOCTYPE html>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
  :root {
    --bg: #ffffff;
    --text: #0f0f0f;
    --muted: #909090;
    --border: #e8e8e8;
    --card-bg: #f9f9f9;
    --code-bg: #1e1e2e;
  }
  [data-theme="dark"] {
    --bg: #0f0f0f;
    --text: #efefef;
    --muted: #6a6a6a;
    --border: #272727;
    --card-bg: #181818;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Plus Jakarta Sans', sans-serif;
    transition: background 0.3s, color 0.3s;
    min-height: 100vh;
  }
  nav {
    display: flex; align-items: center; justify-content: flex-end;
    padding: 24px 48px; border-bottom: 1px solid var(--border);
  }
  #theme-toggle {
    background: none; border: none; cursor: pointer; color: var(--muted);
    padding: 6px; border-radius: 6px;
  }
  #theme-toggle:hover { color: var(--text); background: var(--border); }
  main { max-width: 860px; margin: 0 auto; padding: 72px 48px; }
  .intro { margin-bottom: 72px; }
  .intro h1 { font-size: 27px; font-weight: 600; margin-bottom: 12px; }
  .intro p { font-size: 15.5px; color: var(--muted); line-height: 1.75; }
  .section-label {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted);
    letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px;
  }
  .works-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px,1fr)); gap: 16px; margin-bottom: 64px; }
  .work-card { border: 1px solid var(--border); background: var(--card-bg); overflow: hidden; border-radius: 8px; position: relative; }
  .work-img-wrap { aspect-ratio: 1; overflow: hidden; }
  .work-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .work-hover-info {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.85); color: #fff; padding: 14px 16px;
    transform: translateY(100%); transition: transform 0.3s ease;
  }
  .work-card:hover .work-hover-info { transform: translateY(0); }
  .studio-name { font-size: 13px; font-weight: 600; }
  .stat-val { font-family: 'JetBrains Mono', monospace; font-size: 11px; opacity: 0.8; }

  .scripts-list { display: flex; flex-direction: column; gap: 12px; }
  .script-card { border: 1px solid var(--border); background: var(--card-bg); border-radius: 10px; overflow: hidden; }
  .script-header { display: flex; align-items: center; gap: 14px; padding: 14px 18px; cursor: pointer; }
  .script-icon { width: 38px; height: 38px; border-radius: 6px; background: #1a0a2e; display: flex; align-items: center; justify-content: center; }
  .script-title { font-size: 14px; font-weight: 600; }
  .script-chevron { color: var(--muted); transition: transform 0.3s; margin-left: auto; }
  .script-card.open .script-chevron { transform: rotate(180deg); }
  
  /* FIXED SCROLLING LOGIC */
  .script-body { 
    max-height: 0; 
    overflow: hidden; 
    transition: max-height 0.4s ease-out; 
  }
  .script-card.open .script-body { 
    max-height: 500px; /* Set a reasonable max height for the viewport */
    overflow-y: auto;  /* Enable vertical scroll */
  }
  .script-code-wrap { 
    border-top: 1px solid var(--border); 
    background: var(--code-bg); 
    padding: 20px;
    overflow-x: auto; /* Enable horizontal scroll */
  }
  pre { 
    font-family: 'JetBrains Mono', monospace; 
    font-size: 12.5px; 
    line-height: 1.7; 
    color: #cdd6f4;
    white-space: pre; /* Keeps code structure */
  }

  .kw { color: #cba6f7; }
  .fn { color: #89b4fa; }
  .str { color: #a6e3a1; }
  .cmt { color: #6c7086; font-style: italic; }

  /* Custom Scrollbar for Dark Mode feel */
  .script-body::-webkit-scrollbar { width: 8px; height: 8px; }
  .script-body::-webkit-scrollbar-track { background: var(--code-bg); }
  .script-body::-webkit-scrollbar-thumb { background: #313244; border-radius: 4px; }
  .script-body::-webkit-scrollbar-thumb:hover { background: #45475a; }
</style>
</head>

<script>
lucide.createIcons();

const html = document.documentElement;
const themeToggle = document.getElementById('theme-toggle');
const sunIcon = document.getElementById('icon-sun');
const moonIcon = document.getElementById('icon-moon');

function applyTheme(theme) {
  html.setAttribute('data-theme', theme);
  sunIcon.style.display = theme === 'dark' ? 'none' : 'block';
  moonIcon.style.display = theme === 'dark' ? 'block' : 'none';
}

if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
  applyTheme('dark');
}

themeToggle.addEventListener('click', () => {
  const current = html.getAttribute('data-theme');
  applyTheme(current === 'dark' ? 'light' : 'dark');
});

function highlight(raw) {
  return raw.split('\n').map(line => {
    if (line.trim().startsWith('--')) return `<span class="cmt">${line}</span>`;
    return line.replace(/\b(local|function|end|if|then|return)\b/g, '<span class="kw">$1</span>');
  }).join('\n');
}

document.querySelectorAll('.script-card').forEach(card => {
  card.querySelector('.script-header').addEventListener('click', () => {
    const isOpen = card.classList.contains('open');
    if (!isOpen) {
      card.classList.add('open');
      const pre = card.querySelector('pre');
      if (pre.innerHTML === "") {
        const id = card.getAttribute('data-script-id');
        pre.innerHTML = highlight(document.getElementById('raw-' + id).textContent.trim());
      }
    } else {
      card.classList.remove('open');
    }
  });
});
</script>
